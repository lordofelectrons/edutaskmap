<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Open book - left page -->
  <path d="M6 14 C6 12 8 10 10 10 L30 10 C31 10 32 11 32 12 L32 52 C32 52 28 50 22 50 L10 50 C8 50 6 48 6 46 Z" fill="#0f1629" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Open book - right page -->
  <path d="M58 14 C58 12 56 10 54 10 L34 10 C33 10 32 11 32 12 L32 52 C32 52 36 50 42 50 L54 50 C56 50 58 48 58 46 Z" fill="#0f1629" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Book spine glow -->
  <line x1="32" y1="10" x2="32" y2="52" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  <!-- Left page lines -->
  <line x1="12" y1="20" x2="27" y2="20" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="12" y1="26" x2="25" y2="26" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="12" y1="32" x2="26" y2="32" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="12" y1="38" x2="24" y2="38" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <!-- Right page lines -->
  <line x1="37" y1="20" x2="52" y2="20" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="37" y1="26" x2="50" y2="26" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="37" y1="32" x2="51" y2="32" stroke="#00d4ff" stroke-width="0.8" opacity="0.3"/>
  <!-- Feather quill - shaft -->
  <line x1="44" y1="6" x2="52" y2="46" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Feather quill - left vane -->
  <path d="M44 6 C38 12 40 20 43 24 C40 18 39 12 44 6" fill="#7c3aed" opacity="0.7"/>
  <!-- Feather quill - right vane -->
  <path d="M44 6 C50 10 50 18 48 22 C51 16 51 10 44 6" fill="#a55eea" opacity="0.6"/>
  <!-- Feather tip nib -->
  <circle cx="52.5" cy="47" r="1" fill="#00d4ff"/>
  <!-- Ink dot on page -->
  <circle cx="51" cy="38" r="1.2" fill="#00d4ff" opacity="0.5"/>
</svg>
